<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Bizora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Bizora<span>.</span></a>
        </div>
    </nav>

    <div class="legal-page">
        <div class="container">
            <h1 class="text-center" style="margin-bottom: 20px;">Contact Support</h1>
            <p class="text-center" style="margin-bottom: 50px;">We're here to help you start your journey.</p>
            
            <div class="contact-form">
                <form action="#">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>How can we help?</label>
                        <textarea rows="5" placeholder="Tell us about your issue..."></textarea>
                    </div>
                    <button type="button" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>
                <div style="margin-top: 40px; text-align: center;">
                    <p>Or email us directly at:</p>
                    <p class="email-link">support@bizora.in</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
